<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Administração — Dos tais</title>
  <link rel="icon" href="img/logo.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b08d70" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Bebê Admin" />
  <link rel="apple-touch-icon" href="img/logo-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="beige">

  <!-- Carregando -->
  <div id="tela-carregando" class="tela-auth">
    <div class="tela-auth-conteudo">
      <div class="login-logo">
        <img src="img/mamadeira.png" alt="" class="img-logo" />
      </div>
      <div class="login-spinner"></div>
    </div>
  </div>

  <!-- Acesso negado -->
  <div id="tela-acesso-negado" class="tela-auth" style="display:none;">
    <div class="tela-auth-conteudo">
      <div class="login-logo acesso-negado-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
      </div>
      <h1 class="login-titulo">Sem permissão</h1>
      <p class="login-subtitulo">Esta área é restrita a administradores.</p>
      <button class="btn-google-login" onclick="window.location.href='index.html'">Ir para o aplicativo</button>
      <button class="btn-google-login" onclick="window.fazerLogout()" style="margin-top:8px;border-color:transparent;color:var(--text-muted);">Sair</button>
    </div>
  </div>

  <!-- Painel admin -->
  <div id="admin-app" style="display:none;">

    <div id="admin-wrapper" style="max-width:480px;margin:0 auto;min-height:100dvh;padding-bottom:20px;">

      <!-- Cabeçalho fixo -->
      <div class="admin-topbar">
        <div class="admin-topbar-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Administração
        </div>
        <div id="admin-user-info" class="admin-topbar-user"></div>
      </div>

      <!-- Conteúdo principal -->
      <div style="padding:16px;">
        <div id="admin-conteudo">
          <div class="carregando-view"><div class="login-spinner"></div></div>
        </div>
      </div>

    </div>

  </div>


  <!-- ================================================
       MODAL: CONVIDAR USUÁRIO
       ================================================ -->
  <div id="modal-convite" class="modal" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-convite">
    <div class="modal-overlay" onclick="fecharModal('modal-convite')"></div>
    <div class="modal-sheet">
      <div class="modal-header">
        <h2 id="titulo-modal-convite" class="modal-title">Convidar Usuário</h2>
        <button class="modal-close" onclick="fecharModal('modal-convite')" aria-label="Fechar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="form-convite" onsubmit="salvarConvite(event)" novalidate>
          <div class="form-section">
            <div class="form-group">
              <label class="form-label" for="convite-email">E-mail do Google <span class="required">*</span></label>
              <input class="form-input" type="email" id="convite-email" placeholder="exemplo@gmail.com" required />
              <div class="form-hint">Deve ser o e-mail exato da conta Google que a pessoa usará para entrar.</div>
            </div>
            <div class="form-group">
              <label class="form-label">Papel <span class="required">*</span></label>
              <div class="option-group">
                <label class="option-card">
                  <input type="radio" name="convite-role" value="user" checked />
                  <span class="option-content">
                    <span class="option-title">Usuário</span>
                    <span class="option-sub">Acessa Perfil, Histórico e Agenda do próprio perfil</span>
                  </span>
                </label>
                <label class="option-card">
                  <input type="radio" name="convite-role" value="admin" />
                  <span class="option-content">
                    <span class="option-title">Administrador</span>
                    <span class="option-sub">Acesso total, incluindo painel administrativo</span>
                  </span>
                </label>
              </div>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-ghost" onclick="fecharModal('modal-convite')">Cancelar</button>
            <button type="submit" class="btn-primary">Enviar Convite</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal de confirmação -->
  <div id="modal-confirmar" class="modal modal-confirmar" role="dialog" aria-modal="true">
    <div class="modal-overlay" onclick="fecharConfirmar(false)"></div>
    <div class="modal-confirmar-sheet">
      <div id="confirmar-icone" class="confirmar-icone"></div>
      <h2 id="confirmar-titulo" class="confirmar-titulo"></h2>
      <p id="confirmar-msg" class="confirmar-msg"></p>
      <div class="confirmar-acoes">
        <button class="btn-ghost" onclick="fecharConfirmar(false)">Cancelar</button>
        <button id="confirmar-btn-ok" class="btn-primary" onclick="fecharConfirmar(true)">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
  <script type="module" src="firestore-api.js"></script>
  <script src="admin.js"></script>
</body>
</html>
